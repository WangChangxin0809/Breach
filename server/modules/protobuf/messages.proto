syntax = "proto3";

package breach.v1;

option go_package = "breach3v3/server/modules/protobuf";

message Vector2 {
  float x = 1;
  float y = 2;
}

message MoveCommand {
  uint32 version = 1;
  uint64 client_tick = 2;
  Vector2 position = 3;
  Vector2 direction = 4;
}

message CharacterSelect {
  uint32 version = 1;
  string character_id = 2;
}

message CharacterSelectPlayer {
  string user_id = 1;
  string display_name = 2;
  string character_id = 3;
  bool locked = 4;
}

message CharacterSelectState {
  uint32 version = 1;
  bool all_locked = 2;
  repeated CharacterSelectPlayer players = 3;
}

message PlayerState {
  string user_id = 1;
  string display_name = 2;
  int32 faction = 3;
  Vector2 position = 4;
  int32 health = 5;
  bool connected = 6;
  Vector2 direction = 7;
  string character_id = 8;
}

message RoomReady {
  uint32 version = 1;
  bool ready = 2;
}

message RoomPlayer {
  string user_id = 1;
  string display_name = 2;
  bool ready = 3;
}

message RoomState {
  uint32 version = 1;
  int32 player_count = 2;
  repeated RoomPlayer players = 3;
  string game_match_id = 4;
}

message GameState {
  uint32 version = 1;
  uint64 tick = 2;
  int32 round_state = 3;
  float round_time_remaining = 4;
  repeated PlayerState players = 5;
}
